<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پنل مدیریت | روف — داشبورد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/admin.css" />
</head>
<body>

  <button id="sidebar-toggle" class="sidebar-toggle" aria-expanded="false" aria-label="باز/بستن منو" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>

  <div id="dashboard-view" class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="sidebar-brand-logo">R</span>
        <span class="sidebar-brand-name">روف</span>
        <button id="theme-toggle" class="theme-toggle" aria-pressed="false" aria-label="تغییر حالت نور/تاریک">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-nav="reviews" aria-label="نظرات">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="nav-label">نظرات</span>
        </button>
        <button class="nav-item" data-nav="products" aria-label="محصولات">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="7" height="7" rx="1"/><rect x="15" y="3" width="7" height="7" rx="1"/>
            <rect x="2" y="14" width="7" height="7" rx="1"/><rect x="15" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span class="nav-label">محصولات</span>
        </button>
        <button class="nav-item" data-nav="categories" aria-label="دسته‌بندی‌ها">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h7v7h-7z"/>
          </svg>
          <span class="nav-label">دسته‌بندی‌ها</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <span id="sidebar-username" class="sidebar-username"></span>
        <div style="display:flex;gap:.45rem;align-items:center;">
          <button id="logout-btn" class="logout-btn" title="خروج">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            خروج
          </button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <div id="section-reviews"    class="section active"></div>
      <div id="section-products"   class="section"></div>
      <div id="section-categories" class="section"></div>
    </main>

  </div>

  <div id="modal-backdrop" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <button class="modal-close" id="modal-close" aria-label="بستن">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div id="confirm-backdrop" class="modal-backdrop" hidden>
    <div class="modal modal--sm" role="alertdialog">
      <div class="modal-header">
        <h2 class="modal-title" id="confirm-title">تأیید عملیات</h2>
      </div>
      <div class="modal-body">
        <p id="confirm-msg" class="confirm-msg"></p>
        <div class="confirm-actions">
          <button id="confirm-yes" class="btn btn--danger">تأیید</button>
          <button id="confirm-no"  class="btn btn--ghost">انصراف</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
