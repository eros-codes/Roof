<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>پنل مدیریت | روف — ورود</title>
  <link rel="stylesheet" href="./assets/css/admin.css" />
</head>
<body>

  <div id="login-view" class="login-view">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-brand-logo">R</span>
        <span class="login-brand-name">روف</span>
      </div>
      <h1 class="login-title">ورود به پنل مدیریت</h1>
      <p class="login-sub">اطلاعات ادمین را وارد کنید</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="field">
          <label class="field-label" for="l-username">نام کاربری</label>
          <input id="l-username" name="username" type="text" class="field-input"
                 placeholder="admin" autocomplete="username" required />
        </div>
        <div class="field">
          <label class="field-label" for="l-password">رمز عبور</label>
          <input id="l-password" name="password" type="password" class="field-input"
                 placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" class="btn btn--accent btn--full" id="login-btn">
          <span class="btn-text">ورود</span>
          <span class="btn-spinner" hidden></span>
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
