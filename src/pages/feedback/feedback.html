<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>نظرات | روف</title>
	<link rel="stylesheet" href="./style/main.css" />
	<link rel="icon" type="image/png" href="../../../public/assets/images/Logo.PNG" />
</head>

<body>
	<div>
		<header class="menu-header">
			<div class="menu-header-top">
				<div class="menu-header-right">
					<button id="mobile-hamburger" class="mobile-hamburger" aria-label="opemimg menu">
						<span class="hamburger-icon">
							<span></span>
							<span></span>
							<span></span>
						</span>
					</button>
					<div class="menu-logo">
						<img src="../../../public/assets/images/Logo-2.PNG" alt="logo">
					</div>
				</div>
			</div>
		</header>

		<main class="feedback-page">

			<section class="chat-section">
				<div class="chat-container">

					<div class="chat-header">
						<div class="chat-avatar">R</div>
						<div class="chat-meta">
							<h2 class="chat-name">روف</h2>
							<span class="chat-status">
								<span class="status-dot"></span>
								آنلاین
							</span>
						</div>
					</div>

					<div class="chat-window">
						<div class="chat-messages" id="chat-messages"></div>
					</div>

					<div class="chat-controls" dir="ltr">

						<button class="ctrl-btn" id="next-btn" aria-label="نظر بعدی">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
								stroke-linecap="round" stroke-linejoin="round">
								<polyline points="9 18 15 12 9 6"></polyline>
							</svg>
						</button>

						<button class="ctrl-btn ctrl-btn--pause" id="pause-btn" aria-label="توقف">
							<svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
								<rect x="6" y="4" width="4" height="16" rx="1"></rect>
								<rect x="14" y="4" width="4" height="16" rx="1"></rect>
							</svg>
							<svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" style="display:none">
								<polygon points="5 3 19 12 5 21 5 3"></polygon>
							</svg>
						</button>

						<button class="ctrl-btn" id="prev-btn" aria-label="نظر قبلی">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
								stroke-linecap="round" stroke-linejoin="round">
								<polyline points="15 18 9 12 15 6"></polyline>
							</svg>
						</button>

					</div>

					<div class="chat-dots" id="chat-dots"></div>

				</div>
			</section>

			<section class="form-section">
				<div class="form-container">

					<div class="form-header">
						<h2 class="form-title">نظر شما</h2>
						<p class="form-subtitle">تجربه‌تان را با ما به اشتراک بگذارید</p>
					</div>

					<form id="feedback-form" class="feedback-form" novalidate>

						<div class="field-group">
							<label for="review-name" class="field-label">
								نام
								<span class="optional">(اختیاری)</span>
							</label>
							<input type="text" id="review-name" name="name" class="field-input" placeholder="نام شما"
								autocomplete="name" maxlength="64" />
						</div>

						<div class="field-group">
							<label for="review-text" class="field-label">نظر</label>
							<textarea id="review-text" name="review" class="field-input field-textarea"
								placeholder="تجربه‌تان را بنویسید..." required maxlength="100"></textarea>
							<span class="char-count" id="char-count" dir="ltr">۰ / ۱۰۰</span>
						</div>

						<button type="submit" class="submit-btn" id="submit-btn">
							<span class="submit-text">ثبت نظر</span>
							<span class="submit-icon" aria-hidden="true">←</span>
						</button>

					</form>

					<div class="form-feedback" id="form-feedback" role="status" aria-live="polite"></div>

				</div>
			</section>
		</main>
	</div>


	<footer class="menu-footer">
		<div>
			<div class="menu-footer-top">
				<h6 class="menu-footer-subtitle">your daily escape</h6>
				<h4 class="menu-footer-title">Roof,</h4>
			</div>
			<div>
				<ul class="menu-footer-links">
					<li><a href="../about/about.html">درباره ما</a></li>
					<li><a href="../about/about.html">تماس با ما</a></li>
					<li><a href="../menu/menu.html">منو</a></li>
				</ul>
			</div>
		</div>
		<h6 class="menu-footer-copyright">تمامی حقوق این سایت متعلق به کافه روف می باشد.</h6>
		<h6 class="menu-footer-credit">Made with love 🤍 Eros & Nord </h6>
	</footer>

								<circle cx="22" cy="9" r=".5" fill="currentColor" />
							</g>
						</svg>
						<span class="link-text">منو</span>

				<li>

		</nav>

</body>
